name: Promotion Expiry Reminders

on:
  schedule:
    # Run daily at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send Expiry Reminders
        run: |
          curl -X GET "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/cron/promotion-expiry-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
