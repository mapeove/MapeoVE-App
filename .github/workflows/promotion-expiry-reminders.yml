name: Promotion Expiry Reminders

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send Expiry Reminders
        run: |
          curl -f -X GET "https://mapeove.com/api/cron/promotion-expiry-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"